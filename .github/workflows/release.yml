name: 发布 Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: 编译 ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: codeconnect.exe
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: codeconnect
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: codeconnect

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: 安装系统依赖 (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential

      - name: 设置 macOS 部署目标
        if: matrix.os == 'macos-latest'
        run: echo "MACOSX_DEPLOYMENT_TARGET=10.15" >> $GITHUB_ENV

      - name: 编译
        run: cargo build --release -p codeconnect-cli --target ${{ matrix.target }}

      - name: 准备产物 (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          cp target/${{ matrix.target }}/release/${{ matrix.artifact }} .
          chmod +x ${{ matrix.artifact }}

      - name: 准备产物 (Windows)
        if: matrix.os == 'windows-latest'
        run: cp target/${{ matrix.target }}/release/${{ matrix.artifact }} .

      - name: 上传产物
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}
          body: |
            ## 安装方法

            下载对应平台的二进制文件，放到 PATH 中即可使用：

            | 平台 | 文件 |
            |------|------|
            | Windows (x64) | `codeconnect.exe` |
            | Linux (x64) | `codeconnect` |
            | macOS (x64) | `codeconnect` |

            ### 从源码编译

            ```bash
            git clone https://github.com/AYwlilwYA/code-connect.git
            cd code-connect
            cargo build --release -p codeconnect-cli
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
